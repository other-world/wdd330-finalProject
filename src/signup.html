<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERT Member Page</title>
    <meta name="description" content="Project page for WDD 231, the start of a login zone for members">
    <meta name="author" content="Jamie Cummings">

    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">

    <!-- Style Sheets (CSS) -->
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/base-large.css">

    <!-- Supporting Javascript -->
    <script src="/js/summary.js" defer></script>
    <script type="module" src="/js/main.js"></script>


    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Allura&family=Inconsolata:wght@200..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Gupter:wght@400;500;700&family=Roboto:wght@100;400&display=swap"
        rel="stylesheet">

    <!-- Social media meta tags -->
    <meta property="og:title" content="WDD330 Final Project for Jamie Cummings">
    <meta property="og:description"
        content="WDD330 focuses on Frontend Web Development Skill. This page shows the work done by Jamie Cummings.">
    <meta property="og:image" content="https://other-world.github.io/wdd330/project/images/tertLogo.webp">
    <meta property="og:url" content="https://other-world.github.io/wdd330/chamber/">
    <meta property="og:type" content="website">

    <meta name="twitter:title"
        content="WDD330 focuses on Frontend Web Development Skill. This page shows the work done by Jamie Cummings">
    <meta name="twitter:description"
        content="WDD330 focuses on Frontend Web Development Skill. This page shows the work done by Jamie Cummings.">
    <meta name="twitter:image" content="https://other-world.github.io/wdd231/project/images/tertLogo.webp">
    <meta name="twitter:card" content="summary_large_image">

</head>

<body>
    <header id="tert-header"></header>

    <main>
        <aside id="navMenu"></aside>
        <div>
            <h2>Weekend Signups</h2>
            <div id="singlepage">
                <form method="get" action="signup-results.html" id="signupForm" name="signupForm">
                    <div id="mainForm">
                        <fieldset>
                            <legend>Personal Info</legend>
                            <label for="fname">*First name:
                                <input type="text" id="fname" name="fname" autocomplete="given-name" placeholder="John"
                                    required>
                            </label>
                            <label for="lname">*Last name:
                                <input type="text" id="lname" name="lname" autocomplete="family-name" placeholder="Doe"
                                    required>
                            </label>

                            <label for="weekend">Weekend:
                                <input type="date" id="weekend" name="weekend" min="2025-05-23" max="2025-09-21" required>
                            </label>
                            <button class="button open-modal">! Important</button>

                            <dialog class="modal" id="modal">
                              <h2>Remember</h2>
                              <p>While emergencies do come up, please do your best to commit to any weekend for which you sign up. Cancellations might result in too few team members, or a vacancy at a major hub on the mountain.</p>
                              <button class="close-modal">x</button>
                            </dialog>
                            
                        </fieldset>

                        <fieldset>
                            <legend>Position</legend>
                            <div id="positionLimiter">
                                <span>
                                    <label for="ag">
                                        <input type="radio" name="position" id="ag" value="Aspen Grove">
                                        Aspen Grove Trailhead</label>
                                </span>

                                <span>
                                    <label for="sf">
                                        <input type="radio" name="position" id="sf" value="Stewart Falls">
                                        Stewart Falls</label>
                                </span>

                                <span>
                                    <label for="timpooneke">
                                        <input type="radio" name="position" id="timpooneke" value="Timpooneke">
                                        Timpooneke</label>
                                </span>

                                <span>
                                    <label for="hc">
                                        <input type="radio" name="position" id="hc" value="High Camp">
                                        High Camp</label>
                                </span>
                            </div>
                        </fieldset>
                    </div>
                    <div id="submitButton"></div>
                </form>
            </div>
        </div>

    </main>

    <footer id="tert-footer"></footer>
</body>

</html>
