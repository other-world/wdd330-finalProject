<body>
    <header id="tert-header"></header>

    <main>
        <aside id="navMenu"></aside>
        <div>
            <h2>Update your certification information</h2>
            <form  method="get" action="qualified.html" id="singlepage">
                <fieldset>
                    <legend>Medical</legend>
                    
                    <div class="title">What medical certifications do you have?<br><i>(Check all that apply)</i></div>
                    <label class="medCert"><input type="checkbox" name="cpr" value="yes">CPR/AED</label><br>
                    <label class="medCert"><input type="checkbox" name="wfa" value="yes">Wilderness First Aid</label><br>
                    <label class="medCert"><input type="checkbox" name="wfr" value="yes">Wilderness First Responder</label><br>
                    <label class="medCert"><input type="checkbox" name="emt" value="yes">EMT</label><br>
                    <label class="medCert"><input type="checkbox" name="nurse" value="yes">Nurse (be specific below)</label><br>
                    <label class="medCert"><input type="checkbox" name="md" value="yes">MD</label><br><br>
                    <label for="medOther">If other, please list:<br>
                    <input type="text" id="medOther" name="medOther"><br>
                </label>
                </fieldset>
                <fieldset>
                    <legend>Ham Radio</legend>
                    <br>
                    <div>*License Class:</div>
                        <input type="radio" name="hamRadio" id="none" value="None">
                        <label for="none">None</label><br>
                        <input type="radio" name="hamRadio" id="technician" value="Technician">
                        <label for="technician">Technician</label><br>
                        <input type="radio" name="hamRadio" id="general" value="General">
                        <label for="general">General</label><br>
                        <input type="radio" name="hamRadio" id="amateurExtra" value="AmateurExtra">
                        <label for="amateurExtra">AmateurExtra</label><br><br>
                    <label for="callSign">*Call Sign (type none if no license):<br>
                        <input type="text" id="callSign" name="callSign" autocomplete="off" required><br><br>
                    </label>
                </fieldset>
                <input type="submit" value="Update My Certifications">
            </form>
        </div>
    </main>

    <footer id="tert-footer"></footer>
</body>
